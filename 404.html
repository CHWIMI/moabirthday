<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지 점검 중</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #333;
            text-align: center;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            padding: 10px 20px;
            background-color: #24292e; /* 깃허브 스타일의 어두운 버튼 색상 */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #0366d6;
        }
    </style>
</head>
<body>
    <h1>🚧 시스템 점검 중입니다 🚧</h1>
    <p>현재 더 나은 서비스를 위해 페이지 업데이트 및 패치를 진행하고 있습니다.<br>잠시 후 다시 접속해 주세요.</p>
    
    <a href="/" class="btn">메인 화면으로 돌아가기</a>
</body>
</html>
